<div class="notices-container">
    <h2>📢 Notices</h2>
    <div id="noticesList"></div>
</div>

<style>
.notices-container { padding: 20px; }
.notice-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #667eea; }
.notice-title { font-weight: bold; font-size: 16px; margin-bottom: 8px; }
.notice-content { color: #666; }
.priority-High { border-left-color: #dc3545; }
.priority-Medium { border-left-color: #ffc107; }
.priority-Low { border-left-color: #28a745; }
</style>

<script>
async function loadNotices() {
    try {
        const token = localStorage.getItem('token');
        const res = await fetch('http://localhost:5000/api/notices', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success && data.notices) {
            const container = document.getElementById('noticesList');
            container.innerHTML = data.notices.map(n => `
                <div class="notice-card priority-${n.priority}">
                    <div class="notice-title">📌 ${n.title}</div>
                    <div class="notice-content">${n.content}</div>
                    <small>🎯 ${n.targetAudience} | 📅 ${new Date(n.createdAt).toLocaleDateString()}</small>
                </div>
            `).join('');
        }
    } catch (error) {
        console.error('Error:', error);
    }
}
loadNotices();
</script>
