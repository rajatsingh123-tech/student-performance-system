<div class="placements-container">
    <h2>💼 Placements</h2>
    <div id="placementsList"></div>
</div>

<style>
.placements-container { padding: 20px; }
.placement-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.company { font-size: 18px; font-weight: bold; color: #667eea; }
.package { color: #28a745; font-weight: bold; }
</style>

<script>
async function loadPlacements() {
    try {
        const token = localStorage.getItem('token');
        const res = await fetch('https://student-performance-system-44as.onrender.com/api/placements', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success && data.placements) {
            const container = document.getElementById('placementsList');
            container.innerHTML = data.placements.map(p => `
                <div class="placement-card">
                    <div class="company">${p.company}</div>
                    <div class="student">👨‍🎓 ${p.studentName}</div>
                    <div class="role">💻 ${p.role}</div>
                    <div class="package">💰 ${p.package} LPA</div>
                    <div class="batch">🎓 Batch ${p.batch}</div>
                </div>
            `).join('');
        }
    } catch (error) {
        console.error('Error:', error);
    }
}
loadPlacements();
</script>
